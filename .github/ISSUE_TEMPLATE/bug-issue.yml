name: " 버그"
description: "발견한 버그를 보고해주세요. 자세한 정보를 포함해 주시면 큰 도움이 됩니다!"
title: "[BUG] - 간단한 문제 설명"
labels:
  - bug
  - needs triage
assignees:
  - ""

body:
  - type: markdown
    attributes:
      value: |
        아래 템플릿을 따라 버그를 보고해주세요. 필요한 정보를 모두 작성해주세요.

  - type: input
    id: bug_description
    attributes:
      label: "버그 설명"
      description: "발생한 버그에 대해 명확하고 간결하게 설명해주세요."
      placeholder: "버그가 무엇인지 간단히 적어주세요."
